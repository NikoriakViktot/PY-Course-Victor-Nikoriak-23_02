<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Нотатки{% endblock %}</title>
    <!-- Підключення Tailwind CSS через CDN -->
    <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 flex flex-col min-screen-h">

    <!-- Навігаційна панель -->
    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex space-x-8 items-center">
                    <!-- Логотип / Назва -->
                    <a href="{% url 'main_page' %}" class="flex-shrink-0 flex items-center font-bold text-xl text-indigo-600 tracking-tight">
                        📝 Блокнот
                    </a>
                    <!-- Посилання в меню -->
                    <div class="hidden md:flex space-x-4">
                        <a href="{% url 'main_page' %}" class="text-gray-600 hover:text-indigo-600 px-3 py-2 rounded-md text-sm font-medium transition">
                            Головна сторінка
                        </a>
                        <!-- Плавний якір на форму створення на головній сторінці -->
                        <a href="{% url 'main_page' %}#note_form_section" class="text-gray-600 hover:text-indigo-600 px-3 py-2 rounded-md text-sm font-medium transition">
                            Створити нотатку
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Основний контент сторінки -->
    <main class="flex-grow max-w-6xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Підвал сторінки -->
    <footer class="bg-white border-t border-gray-200 py-4 text-center text-sm text-gray-500 mt-auto">
        &copy; 2026 Додаток Нотаток. Всі права захищено.
    </footer>

</body>
</html>
