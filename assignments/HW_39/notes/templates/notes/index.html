{% load static %}
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Борд Нотаток — Папка HW_39</title>
    <link rel="stylesheet" href="{% static 'notes/css/style.css' %}">
</head>
<body>
    <header>
        <div class="header-container">
            <h1>📌 Мій Борд Нотаток [Папка HW_39]</h1>
            <p>Основи мови розмітки HTML та стилів CSS</p>
        </div>
    </header>

    <main class="main-content">
        <div class="notes-grid">
            {% for note in notes %}
                <article class="note-card">
                    <div class="card-badge">Нотатка №{{ note.id }}</div>
                    <h2>{{ note.title }}</h2>
                    <p>{{ note.content }}</p>
                    <div class="card-footer">
                        <time>📅 {{ note.date }}</time>
                    </div>
                </article>
            {% empty %}
                <p class="no-notes">Нотаток поки що немає.</p>
            {% endfor %}
        </div>
    </main>
</body>
</html>
