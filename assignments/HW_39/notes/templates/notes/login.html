<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід у систему</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">

    <div class="container" style="max-width: 450px;">
        <div class="card shadow border-0 rounded-3">
            <div class="card-header bg-dark text-white text-center py-3">
                <h4 class="mb-0">🔐 Авторизація на Борді</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    {% csrf_token %}

                    {% if form.errors %}
                        <div class="alert alert-danger py-2">Неправильне ім'я користувача або пароль!</div>
                    {% endif %}

                    <div class="mb-3">
                        <label for="id_username" class="form-label fw-bold">Логін</label>
                        <input type="text" name="username" id="id_username" class="form-control" placeholder="Введіть ваш логін..." required>
                    </div>

                    <div class="mb-3">
                        <label for="id_password" class="form-label fw-bold">Пароль</label>
                        <input type="password" name="password" id="id_password" class="form-control" placeholder="Введіть пароль..." required>
                    </div>

                    <button type="submit" class="btn btn-dark w-100 fw-bold mt-2 py-2">Увійти в систему</button>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
