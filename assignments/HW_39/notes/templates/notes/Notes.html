<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Створити нотатку — Bootstrap 5</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="{% url 'notes_index' %}">
                <span class="fs-4 me-2">📌</span> **Борд Нотаток**
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link px-3" href="{% url 'notes_index' %}">🏠 Головна</a>
                <a class="btn btn-primary btn-sm my-auto ms-2 disabled" href="#">➕ Створити нотатку</a>
            </div>
        </div>
    </nav>

    <main class="container my-5" style="max-width: 700px;">
        <div class="card shadow border-0 rounded-3">
            <div class="card-header bg-primary text-white py-3">
                <h3 class="card-title mb-0 d-flex align-items-center">
                    <span class="me-2">📝</span> Створити нову нотатку
                </h3>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="title" class="form-label fw-bold">Заголовок нотатки</label>
                        <input type="text" class="form-control form-control-lg" id="title" name="title" placeholder="Введіть короткий заголовок..." required>
                    </div>

                    <div class="mb-3">
                        <label for="text" class="form-label fw-bold">Текст нотатки</label>
                        <textarea class="form-control" id="text" name="text" rows="5" placeholder="Напишіть деталі нотатки..." required></textarea>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="category" class="form-label fw-bold">Категорія</label>
                            <select class="form-select" id="category" name="category">
                                <option value="">Без категорії</option>
                                {% for cat in categories %}
                                    <option value="{{ cat.id }}">{{ cat.title }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="reminder" class="form-label fw-bold">Час нагадування</label>
                            <input type="datetime-local" class="form-control" id="reminder" name="reminder">
                        </div>
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                        <a href="{% url 'notes_index' %}" class="btn btn-light border px-4 me-md-2">Скасувати</a>
                        <button type="submit" class="btn btn-success px-5 fw-bold">💾 Зберегти нотатку</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
