{% extends "notes/base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm border-0 auth-card">
                <div class="card-body p-4">
                    <h1 class="h3 mb-2">Login</h1>
                    <p class="text-muted mb-4">Sign in to manage your notes.</p>

                    {% if form.errors %}
                        <div class="alert alert-danger">Wrong username or password.</div>
                    {% endif %}

                    <form method="post" novalidate>
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label" for="{{ form.username.id_for_label }}">Username</label>
                            <input class="form-control" type="text" name="username" id="{{ form.username.id_for_label }}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="{{ form.password.id_for_label }}">Password</label>
                            <input class="form-control" type="password" name="password" id="{{ form.password.id_for_label }}" required>
                        </div>

                        <button class="btn btn-primary w-100" type="submit">Login</button>
                    </form>

                    <p class="text-center text-muted mt-3 mb-0">
                        No account yet? <a href="{% url 'register' %}">Create one</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
