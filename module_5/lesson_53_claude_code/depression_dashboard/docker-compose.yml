version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: depression_backend
    ports:
      - "5050:5050"
    volumes:
      - ./models:/app/models
      - ../data:/app/../data   # mount parent data/ dir
    environment:
      FLASK_DEBUG: "false"
      FLASK_PORT: "5050"
      DATA_DIR: /data
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: depression_dashboard
    ports:
      - "8501:8501"
    environment:
      BACKEND_URL: http://backend:5050
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  models:
