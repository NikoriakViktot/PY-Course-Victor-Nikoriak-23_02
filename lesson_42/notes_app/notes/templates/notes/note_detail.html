{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ note.title }}</title>
    <link rel="stylesheet" href="{% static 'notes/style.css' %}">
</head>
<body>
    <main class="container">
        <div class="page-header">
            <h1>{{ note.title }}</h1>
            <a class="secondary-link" href="{% url 'notes_list' %}">Back to notes</a>
        </div>

        <section class="note-card">
            <p class="category">Category: {{ note.category.title }}</p>
            <p>{{ note.text }}</p>
            {% if note.reminder %}
                <p class="reminder">Reminder: {{ note.reminder|date:"Y-m-d H:i" }}</p>
            {% else %}
                <p class="reminder">Reminder: not set</p>
            {% endif %}
        </section>

        <h2>Edit note</h2>
        <form class="note-form" method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Save changes</button>
        </form>

        <form class="delete-form" method="post" action="{% url 'note_delete' note.pk %}">
            {% csrf_token %}
            <button class="danger" type="submit">Delete note</button>
        </form>
    </main>
</body>
</html>
