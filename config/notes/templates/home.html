<!DOCTYPE html>
<html>
<head>
    <title>Нотатки</title>
</head>
<body>

<h1>Список нотаток</h1>

{% for note in notes %}
    <h2>{{ note.title }}</h2>
    <p>{{ note.text }}</p>
    <p>Категорія: {{ note.category.title }}</p>
    <p>Нагадування: {{ note.reminder }}</p>
    <hr>
{% endfor %}

</body>
</html>
